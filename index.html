<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaceta Dorada</title>
    <style>
        /* Variables de color para mantener la estética dorada */
        :root {
            --dorado: #d4af37;
            --oscuro: #121212;
            --claro: #f4f4f4;
            --gris: #1e1e1e;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--oscuro);
            color: var(--claro);
            scroll-behavior: smooth;
        }

        /* Encabezado fijo */
        header {
            background-color: #000;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dorado);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 2em;
            font-weight: bold;
            color: var(--dorado);
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
        }

        nav a {
            color: var(--claro);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--dorado);
        }

        /* Sección principal (Hero) */
        .hero {
            text-align: center;
            padding: 120px 20px;
            /* Imagen de fondo genérica de alta calidad */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1504711434969-e33886168f5c?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
        }

        .hero h1 {
            font-size: 4.5em;
            color: var(--dorado);
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .hero p {
            font-size: 1.2em;
            max-width: 600px;
            margin: 0 auto 40px;
            color: #ccc;
        }

        .btn {
            background-color: var(--dorado);
            color: #000;
            padding: 15px 35px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--dorado);
        }

        /* Sección de contenido */
        .content {
            padding: 60px 50px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background-color: var(--gris);
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--dorado);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card h3 {
            padding: 20px 20px 5px;
            color: var(--dorado);
            margin: 0;
        }

        .card p {
            padding: 0 20px 20px;
            color: #aaa;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            padding: 30px;
            background-color: #000;
            border-top: 1px solid var(--dorado);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Gaceta Dorada</div>
    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#novedades">Novedades</a>
        <a href="https://www.instagram.com/gacetadorada?igsh=OGdsdzQyYzI2OGFp" target="_blank">Instagram</a>
    </nav>
</header>

<section class="hero" id="inicio">
    <h1 id="titulo-dinamico">Gaceta Dorada</h1>
    <p>La fuente más brillante de información y estilo. Explora nuestras últimas publicaciones y sé parte de la comunidad dorada.</p>
    <a href="https://www.instagram.com/gacetadorada?igsh=OGdsdzQyYzI2OGFp" target="_blank" class="btn">Síguenos en Instagram</a>
</section>

<section class="content" id="novedades">
    <h2 style="color: var(--dorado); font-size: 2.5em;">Publicaciones Destacadas</h2>
    <div class="grid" id="contenedor-articulos">
        </div>
</section>

<footer>
    <p>&copy; 2026 Gaceta Dorada. Todos los derechos reservados.</p>
</footer>

<script>
    // JAVASCRIPT: Agrega interactividad y carga de datos dinámica
    document.addEventListener("DOMContentLoaded", () => {
        
        // 1. Datos simulados (Puedes reemplazarlos con el contenido real de tu Instagram/Revista)
        const publicaciones = [
            { titulo: "Elegancia Moderna", desc: "Descubre las tendencias que están definiendo el estándar del lujo este mes.", img: "https://images.unsplash.com/photo-1490481651871-ab68de25d43d?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" },
            { titulo: "Arte y Cultura", desc: "Un recorrido visual por las exposiciones más deslumbrantes de la temporada.", img: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" },
            { titulo: "Destinos Exclusivos", desc: "Los lugares imprescindibles que debes visitar para vivir una experiencia dorada.", img: "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" }
        ];

        const contenedor = document.getElementById('contenedor-articulos');

        // 2. Renderizar las tarjetas dinámicamente
        publicaciones.forEach(pub => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${pub.img}" alt="${pub.titulo}">
                <h3>${pub.titulo}</h3>
                <p>${pub.desc}</p>
            `;
            contenedor.appendChild(card);
        });

        // 3. Animación interactiva con JavaScript en el título principal
        const titulo = document.getElementById('titulo-dinamico');
        titulo.addEventListener('mouseover', () => {
            titulo.style.color = '#ffffff';
            titulo.style.textShadow = '0 0 20px #d4af37';
        });
        titulo.addEventListener('mouseout', () => {
            titulo.style.color = '#d4af37';
            titulo.style.textShadow = 'none';
        });
    });
</script>

</body>
</html>
